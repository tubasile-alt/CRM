name: Fase 1 controlled extraction

on:
  push:
    branches:
      - refactor/fase-1-extract-services
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  extract-and-validate:
    if: ${{ github.event_name == 'pull_request' || !startsWith(github.event.head_commit.message, 'refactor(fase-1):') }}
    runs-on: ubuntu-latest
    env:
      DISABLE_SCHEDULER: "1"
      DATABASE_URL: sqlite:////tmp/crm-fase1.db
      SECRET_KEY: fase1-ci-secret
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refactor/fase-1-extract-services

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            pip install -r requirements.txt pytest
          fi

      - name: Apply name-based extraction
        run: python .github/scripts/fase1_run.py

      - name: Refresh URL contract snapshot
        run: python -m tests.generate_url_snapshot

      - name: Report exact URL contract count
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          candidates = list(Path('tests').glob('*url*snapshot*.json')) + list(Path('tests').glob('*url*contract*.json'))
          if not candidates:
              raise SystemExit('Snapshot JSON de URL não encontrado')
          path = candidates[0]
          data = json.loads(path.read_text(encoding='utf-8'))
          if isinstance(data, list):
              count = len(data)
          elif isinstance(data, dict):
              value = next((v for v in data.values() if isinstance(v, list)), None)
              count = len(value) if value is not None else len(data)
          else:
              raise SystemExit(f'Formato inesperado em {path}')
          print(f'URL_SNAPSHOT_PATH={path}')
          print(f'URL_SNAPSHOT_COUNT={count}')
          PY

      - name: Import app without scheduler
        run: |
          output=$(DISABLE_SCHEDULER=1 python -c "from app import app" 2>&1)
          printf '%s\n' "$output"
          if printf '%s' "$output" | grep -q '\[AUTO-FALTOU\] Scheduler iniciado'; then
            echo 'Scheduler iniciou durante import com DISABLE_SCHEDULER=1' >&2
            exit 1
          fi

      - name: Run URL contract
        run: python -m pytest tests/test_url_contract.py -v

      - name: Run full test suite
        run: python -m pytest tests/ -v

      - name: Check no imports from app
        run: |
          if grep -rn "from app import" routes/ services/; then
            echo 'Import circular from app encontrado' >&2
            exit 1
          fi

      - name: Check app route count and moved definitions
        run: |
          route_count=$(grep -c "@app.route" app.py)
          echo "APP_ROUTE_DECORATOR_COUNT=$route_count"
          test "$route_count" -eq 80
          for name in \
            get_brazil_time parse_datetime_with_tz format_brazil_datetime \
            generate_next_patient_code normalize_patient_name find_possible_duplicate_patients \
            _parse_date_or_datetime _serialize_execution _build_execution_from_payload \
            _note_counts_as_finalized _find_finalized_note _resolve_consultation_finalization \
            build_patient_timeline get_doctor_id get_all_doctors; do
            echo "--- grep $name app.py"
            grep -n "$name" app.py || true
            if grep -Eq "^def ${name}\(" app.py; then
              echo "Definição duplicada permaneceu: $name" >&2
              exit 1
            fi
          done

      - name: Show complete diff before commit
        run: git diff --check && git diff --stat && git diff

      - name: Commit validated refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.py services/ tests/
          git commit -m "refactor(fase-1): extract shared helpers to services + refresh URL snapshot (no renames, no behavior change)"
          git push origin HEAD:refactor/fase-1-extract-services
