{% extends "base.html" %}

{% block title %}Sales Funnel - Clínica Basile{% endblock %}

{% block extra_css %}
<style>
    .sale-container { padding: 2rem 0; }
</style>
{% endblock %}

{% block content %}
<div class="sale-container">
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h4 class="mb-0 fw-bold text-primary"><i class="bi bi-funnel"></i> Funil de Vendas - Dr. Arthur Basile</h4>
            <div class="d-flex gap-2 align-items-center">
                <select id="funnelMonthFilter" class="form-select form-select-sm" style="width: auto;">
                    <option value="">Todos os meses</option>
                    <option value="1">Janeiro</option>
                    <option value="2">Fevereiro</option>
                    <option value="3">Março</option>
                    <option value="4">Abril</option>
                    <option value="5">Maio</option>
                    <option value="6">Junho</option>
                    <option value="7">Julho</option>
                    <option value="8">Agosto</option>
                    <option value="9">Setembro</option>
                    <option value="10">Outubro</option>
                    <option value="11">Novembro</option>
                    <option value="12">Dezembro</option>
                </select>
                <select id="funnelYearFilter" class="form-select form-select-sm" style="width: auto;">
                    <option value="">Todos os anos</option>
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                </select>
                <span class="badge bg-primary" id="funnelCount">0</span>
            </div>
        </div>
        <div class="card-body p-3">
            <div id="marcellaFunnelTable" class="row g-3">
                <div class="col-12 text-center py-4">Carregando...</div>
            </div>
        </div>
    </div>
</div>

<script>
function formatDate(dateStr) {
    if (!dateStr) return '-';
    const parts = dateStr.split('T')[0].split('-');
    if (parts.length === 3) {
        return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }
    return dateStr;
}

function loadMarcellaSalesFunnel() {
    const monthFilter = document.getElementById('funnelMonthFilter')?.value || '';
    const yearFilter = document.getElementById('funnelYearFilter')?.value || '';
    
    let url = '/api/crm/marcella-sales-funnel';
    const params = new URLSearchParams();
    if (monthFilter) params.append('month', monthFilter);
    if (yearFilter) params.append('year', yearFilter);
    if (params.toString()) url += '?' + params.toString();
    
    fetch(url)
        .then(r => {
            if (!r.ok) throw new Error('Erro ao carregar funil');
            return r.json();
        })
        .then(data => {
            const tbody = document.getElementById('marcellaFunnelTable');
            const count = document.getElementById('funnelCount');
            if (!tbody || !count) return;

            count.textContent = data.length;
            if (data.length === 0) {
                tbody.innerHTML = '<div class="col-12 text-center py-4 text-muted">Nenhum procedimento pendente neste período.</div>';
                return;
            }

            tbody.innerHTML = data.map(item => `
                <div class="col-md-6 col-lg-4">
                    <div class="card h-100 border-0 shadow-sm" style="border-left: 4px solid #0d6efd;">
                        <div class="card-body">
                            <h6 class="card-title text-primary fw-bold mb-2">${item.patient_name}</h6>
                            <div class="mb-3">
                                <small class="text-muted d-block">Procedimento</small>
                                <span class="badge bg-info text-dark">${item.procedure_name || '-'}</span>
                            </div>
                            <div class="mb-3">
                                <small class="text-muted d-block">Valor Planejado</small>
                                <strong class="text-success fs-5">R$ ${item.planned_value ? item.planned_value.toFixed(2).replace('.', ',') : '0,00'}</strong>
                            </div>
                            <div>
                                <small class="text-muted d-block">Data do Planejamento</small>
                                <small class="text-secondary">${formatDate(item.planned_date)}</small>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        })
        .catch(() => {
            const tbody = document.getElementById('marcellaFunnelTable');
            if (tbody) {
                tbody.innerHTML = '<div class="col-12 text-center py-4 text-danger">Erro ao carregar dados.</div>';
            }
        });
}

document.addEventListener('DOMContentLoaded', () => {
    loadMarcellaSalesFunnel();
    const monthFilter = document.getElementById('funnelMonthFilter');
    const yearFilter = document.getElementById('funnelYearFilter');
    if (monthFilter) monthFilter.addEventListener('change', loadMarcellaSalesFunnel);
    if (yearFilter) yearFilter.addEventListener('change', loadMarcellaSalesFunnel);
});
</script>

{% endblock %}
