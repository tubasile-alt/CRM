{% extends "base.html" %}
{% block title %}Selecionar Médico{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow-sm">
                <div class="card-body p-5">
                    <i class="bi bi-person-lines-fill fs-1 text-primary mb-3 d-block"></i>
                    <h4 class="mb-3">Selecione o Médico</h4>
                    <p class="text-muted mb-4">
                        Para abrir o prontuário correto, use a busca na agenda e selecione o paciente pelo médico vinculado.
                    </p>
                    <a href="{{ url_for('agenda') }}" class="btn btn-primary">
                        <i class="bi bi-calendar3 me-2"></i>Ir para a Agenda
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
